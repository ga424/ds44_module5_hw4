name: Containerized Validation

on:
  workflow_dispatch:
  pull_request:
    branches: ["main"]

jobs:
  local-hadoop-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build JAR
        run: ./mvnw -B -DskipTests clean package

      - name: Start and run local Hadoop smoke test
        run: |
          chmod +x scripts/run_local_containerized.sh
          ./scripts/run_local_containerized.sh

      - name: Capture container logs on failure
        if: failure()
        run: docker compose -f docker-compose.hadoop.yml logs --no-color

      - name: Tear down containers
        if: always()
        run: docker compose -f docker-compose.hadoop.yml down -v
